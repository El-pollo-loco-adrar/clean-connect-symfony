name: Symfony CI/CD

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  tests:
    runs-on: ubuntu-latest

    env:
      APP_ENV: test
      APP_DEBUG: 1
      APP_SECRET: 67d3b0c95805e254e4277b902e1c9d82
      DATABASE_URL: mysql://root:root@127.0.0.1:3306/symfony_test?serverVersion=8.0
      DEFAULT_URI: http://localhost
      MESSENGER_TRANSPORT_DSN: in-memory://
      MAILER_DSN: null://null

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: symfony_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql
          coverage: none

      - name: Install Dependencies
        run: composer install --prefer-dist --no-progress

      - name: Wait for MySQL
        run: |
          sudo apt-get install -y mysql-client
          until mysql -h 127.0.0.1 -uroot -proot -e "SELECT 1"; do
            sleep 2
          done

      # --- ETAPE CRUCIALE : On force la config dans un fichier physique ---
      - name: Force Environment Variables for Web Server
        run: |
          echo 'APP_ENV=test' > .env.local
          echo 'APP_DEBUG=1' >> .env.local
          echo 'DATABASE_URL="mysql://root:root@127.0.0.1:3306/symfony_test?serverVersion=8.0"' >> .env.local
          echo 'MESSENGER_TRANSPORT_DSN="in-memory://"' >> .env.local
          echo 'MAILER_DSN="null://null"' >> .env.local

      - name: Prepare Database
        run: |
          php bin/console doctrine:database:create --if-not-exists
          php bin/console doctrine:schema:create
          php bin/console doctrine:fixtures:load --no-interaction

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install NPM dependencies
        run: npm install

      - name: Build assets
        run: npm run build

      - name: Start Symfony Server
        # Le serveur va maintenant lire obligatoirement .env.test.local au démarrage
        run: php -S 127.0.0.1:8000 -t public &

      - name: Wait for server
        run: sleep 5

      # On nettoie le cache APRES avoir créé le fichier .env.test.local
      - name: Clear Cache
        run: php bin/console cache:clear --env=test

      - name: Run Tests
        run: php bin/phpunit

      - name: Upload Screenshots on Failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: panther-screenshots
          path: '*.png'